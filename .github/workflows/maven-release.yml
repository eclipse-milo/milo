name: Maven Release
permissions:
  contents: read

on:
  release:
    types: [ created ]

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: maven-central-release
    steps:
      - name: Check out release ref
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Validate release commit
        shell: bash
        env:
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_REF_TYPE}" != "tag" ]]; then
            echo "Release publishing must run from a tag ref, got '${GITHUB_REF_TYPE}'." >&2
            exit 1
          fi

          release_commit="$(git rev-parse HEAD)"
          release_branch="release/${GITHUB_REF_NAME#v}"

          git fetch --no-tags --prune origin \
            "+refs/heads/${DEFAULT_BRANCH}:refs/remotes/origin/${DEFAULT_BRANCH}"

          allowed_refs=("refs/remotes/origin/${DEFAULT_BRANCH}")

          ls_remote_status=0
          git ls-remote --exit-code --heads origin "${release_branch}" >/dev/null ||
            ls_remote_status=$?

          if [[ "${ls_remote_status}" -eq 0 ]]; then
            git fetch --no-tags --prune origin \
              "+refs/heads/${release_branch}:refs/remotes/origin/${release_branch}"

            allowed_refs+=("refs/remotes/origin/${release_branch}")
          elif [[ "${ls_remote_status}" -ne 2 ]]; then
            echo "Unable to query release branch ${release_branch}." >&2
            exit "${ls_remote_status}"
          fi

          for allowed_ref in "${allowed_refs[@]}"; do
            if git merge-base --is-ancestor "${release_commit}" "${allowed_ref}"; then
              exit 0
            fi
          done

          {
            echo "Release commit ${release_commit} is not reachable from an allowed release source."
            echo "Allowed refs:"
            printf '  %s\n' "${allowed_refs[@]}"
          } >&2

          exit 1

      - name: Set up Maven Central Repository
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Install GPG secret key
        run: |
          cat <(echo -e "${{ secrets.ORG_GPG_PRIVATE_KEY }}") | gpg --batch --import
          gpg --list-secret-keys --keyid-format LONG

      - name: Publish package
        run: mvn -B clean deploy -P release
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_SONATYPE_TOKEN_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_SONATYPE_TOKEN_PASSWORD }}
          MAVEN_GPG_PASSPHRASE: ${{ secrets.ORG_GPG_PASSPHRASE }}
